
<!DOCTYPE html>
<html>
<head>
  <title>Earning App</title>
</head>
<body>

<h2>Signup / Login</h2>

<input type="email" id="email" placeholder="Enter Email"><br><br>
<input type="password" id="password" placeholder="Enter Password"><br><br>

<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, doc, setDoc } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// 🔥 YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyASZMZt9zXTAd0bnY2mTrNnYw07hqdnkcQ",
  authDomain: "earning-app-c7c1f.firebaseapp.com",
  projectId: "earning-app-c7c1f",
  storageBucket: "earning-app-c7c1f.firebasestorage.app",
  messagingSenderId: "115832886785",
  appId: "1:115832886785:web:be6a2595f08f3f86a8d200"
};

// INIT
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ✅ SIGNUP FUNCTION
window.signup = async function(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if(password.length < 6){
    alert("Password 6 character se bada hona chahiye");
    return;
  }

  try{
    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;

    await setDoc(doc(db, "users", user.uid), {
      email: email,
      balance: 0,
      createdAt: new Date()
    });

    alert("Signup Successful ✅");
    window.location = "dashboard.html";

  }catch(err){
    alert(err.message);
  }
}

// ✅ LOGIN FUNCTION
window.login = async function(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try{
    await signInWithEmailAndPassword(auth, email, password);
    window.location = "dashboard.html";

  }catch(err){
    alert(err.message);
  }
}

</script>

</body>
</html>
