<!DOCTYPE html>
<html>
<head>
  <title>Login - Earning App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family:sans-serif; text-align:center;">

<h2>🔐 Login / Register</h2>

<input type="email" id="email" placeholder="Enter Email"><br><br>
<input type="password" id="password" placeholder="Enter Password"><br><br>

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

<p id="msg"></p>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword }
  from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyASZMZt9zXTAd0bnY2mTrNnYw07hqdnkcQ",
    authDomain: "earning-app-c7c1f.firebaseapp.com",
    projectId: "earning-app-c7c1f",
    storageBucket: "earning-app-c7c1f.firebasestorage.app",
    messagingSenderId: "115832886785",
    appId: "1:115832886785:web:641b1fa50fbaf92da8d200",
    measurementId: "G-YTSTEHZENS"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  window.register = async function () {
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    try {
      await createUserWithEmailAndPassword(auth, email, password);
      document.getElementById("msg").innerText = "✅ Registered Successfully";
    } catch (error) {
      document.getElementById("msg").innerText = error.message;
    }
  }

  window.login = async function () {
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    try {
      await signInWithEmailAndPassword(auth, email, password);
      document.getElementById("msg").innerText = "✅ Login Successful";

      // Redirect to dashboard
      window.location.href = "dashboard.html";

    } catch (error) {
      document.getElementById("msg").innerText = error.message;
    }
  }
</script>

</body>
</html>
